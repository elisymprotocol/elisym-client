name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check_tag.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  ci:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  create-tag:
    needs: [check-version, ci]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git tag "${{ needs.check-version.outputs.tag }}"
          git push origin "${{ needs.check-version.outputs.tag }}"

  build:
    needs: [check-version, create-tag]
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../elisym-${{ matrix.target }}.tar.gz elisym
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: elisym-${{ matrix.target }}
          path: elisym-${{ matrix.target }}.tar.gz

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          generate_release_notes: true
          files: elisym-*.tar.gz

  homebrew:
    needs: [check-version, release]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute checksums
        id: sha
        run: |
          echo "aarch64_apple=$(sha256sum elisym-aarch64-apple-darwin.tar.gz | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(sha256sum elisym-x86_64-unknown-linux-gnu.tar.gz | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        uses: actions/checkout@v4
        with:
          repository: elisymprotocol/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write formula
        run: |
          cat > homebrew-tap/Formula/elisym.rb << 'RUBY'
          class Elisym < Formula
            desc "CLI agent runner for the elisym protocol"
            homepage "https://github.com/elisymprotocol/elisym-client"
            version "$VERSION"
            license "MIT"

            on_macos do
              url "https://github.com/elisymprotocol/elisym-client/releases/download/$VERSION/elisym-aarch64-apple-darwin.tar.gz"
              sha256 "$SHA_AARCH64_APPLE"
            end

            on_linux do
              url "https://github.com/elisymprotocol/elisym-client/releases/download/$VERSION/elisym-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "$SHA_X86_64_LINUX"
            end

            def install
              bin.install "elisym"
            end

            test do
              assert_match "elisym", shell_output("#{bin}/elisym --help")
            end
          end
          RUBY

          # Substitute placeholders
          sed -i "s|\$VERSION|${{ needs.check-version.outputs.tag }}|g" homebrew-tap/Formula/elisym.rb
          sed -i "s|\$SHA_AARCH64_APPLE|${{ steps.sha.outputs.aarch64_apple }}|g" homebrew-tap/Formula/elisym.rb
          sed -i "s|\$SHA_X86_64_LINUX|${{ steps.sha.outputs.x86_64_linux }}|g" homebrew-tap/Formula/elisym.rb

      - name: Push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/elisym.rb
          git commit -m "elisym ${{ needs.check-version.outputs.tag }}"
          git push